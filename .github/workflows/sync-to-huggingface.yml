name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Hugging Face Space README
        run: |
          cat > README.md <<'EOF'
          ---
          title: DeepFirm Quant API
          emoji: 📈
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # DeepFirm Quant API

          FastAPI backend for DeepFirm Quant.

          ## Runtime

          - Docker Space
          - FastAPI served on port 7860
          - Health check: `/health`
          EOF

      - name: Sync repository to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Userzzjjjj/deepfirm-quant-api
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
